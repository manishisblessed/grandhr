<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Offline · GrandHR</title>
<style>
  * { box-sizing: border-box; }
  html, body { margin: 0; height: 100%; }
  body {
    display: grid;
    place-items: center;
    background: linear-gradient(135deg, #0f172a, #1e293b);
    color: #e2e8f0;
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
    padding: 24px;
  }
  .card {
    max-width: 460px;
    width: 100%;
    background: rgba(15, 23, 42, 0.7);
    border: 1px solid rgba(99, 102, 241, 0.25);
    border-radius: 24px;
    padding: 36px 32px;
    text-align: center;
    backdrop-filter: blur(20px);
    box-shadow: 0 20px 60px rgba(99, 102, 241, 0.15);
  }
  .logo {
    width: 56px; height: 56px; border-radius: 16px;
    background: linear-gradient(135deg, #6366f1, #8b5cf6);
    display: grid; place-items: center; margin: 0 auto 18px;
    font-weight: 800; font-size: 22px; letter-spacing: 1px;
    color: white; box-shadow: 0 10px 30px rgba(99, 102, 241, 0.35);
  }
  h1 { margin: 0 0 8px; font-size: 22px; font-weight: 700; }
  p { color: #94a3b8; line-height: 1.6; font-size: 14px; margin: 0 0 24px; }
  .row { display: flex; gap: 8px; justify-content: center; flex-wrap: wrap; }
  button, a.btn {
    display: inline-block;
    padding: 11px 22px;
    border-radius: 12px;
    border: 0;
    font-weight: 600;
    cursor: pointer;
    text-decoration: none;
    font-size: 14px;
    transition: transform 0.15s ease, box-shadow 0.15s ease;
  }
  .primary { background: linear-gradient(135deg, #6366f1, #8b5cf6); color: white; }
  .primary:hover { transform: translateY(-1px); box-shadow: 0 10px 24px rgba(99, 102, 241, 0.35); }
  .ghost { background: rgba(255,255,255,0.06); color: #e2e8f0; border: 1px solid rgba(255,255,255,0.1); }
  .ghost:hover { background: rgba(255,255,255,0.1); }
  .hint { font-size: 12px; color: #64748b; margin-top: 18px; }
</style>
</head>
<body>
  <div class="card">
    <div class="logo">GH</div>
    <h1>You're offline</h1>
    <p>
      No internet connection right now — but your last actions are safe. Punches you make on this
      page will queue and sync automatically as soon as you're back online.
    </p>
    <div class="row">
      <button class="primary" onclick="location.reload()">Try again</button>
      <a class="btn ghost" href="/">Go home</a>
    </div>
    <p class="hint">GrandHR · Made by Shah Works</p>
  </div>
</body>
</html>
