# Stand-alone copy of the Nginx site bootstrapped onto the EC2.
# Kept here so changes are reviewable in PRs; the bootstrap script writes the
# same config to /etc/nginx/sites-available/grandhr-api.

server {
    listen 80;
    listen [::]:80;
    server_name api.grandhr.in;

    location /.well-known/acme-challenge/ {
        root /var/www/html;
    }

    client_max_body_size 12m;

    location = /healthz { proxy_pass http://127.0.0.1:5000; access_log off; }
    location = /readyz  { proxy_pass http://127.0.0.1:5000; access_log off; }

    location / {
        proxy_pass         http://127.0.0.1:5000;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_set_header   Upgrade           $http_upgrade;
        proxy_set_header   Connection        "upgrade";
        proxy_read_timeout 120s;
        proxy_send_timeout 120s;
    }
}
